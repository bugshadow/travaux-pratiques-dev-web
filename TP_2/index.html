<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP 2</title>
</head>
<body>
    <h1>Formulaire</h1>
    <form action="" method="post">
        <p>Entrez les informations suivants :</p>
        <fieldset>
            <legend>Informations personnelles</legend>
                <label for="nom">Nom :</label>
                <input type ="text" name="nom" placeholder="Entrer votre nom" required autocomplete="family-name"> <br>
                <label for="prenom">Prénom :</label>
                <input type ="text" name="prenom" placeholder="Entrer votre prenom" required autocomplete="given-name"> <br>
                <label for="email">Email :</label>
                <input type ="email" name="email" placeholder="Entrer votre email" required autocomplete="email"><br>
                <label for="telephone">telephone :</label>
                <input type="tel" name="telephone" pattern="^0[1-9]([-. ]?[0-9]{2}){4}$" autocomplete="tel"><br>
                <label for="date">Date de naissance :</label>
                <input type="date" name="date" placeholder="Entrer votre date de naissance" min="2008-01-01"><br>
        </fieldset>
        <fieldset>
            <legend>Mot de passe</legend>
                <label for="password">Entrer votre mot de passe : </label>
                <input type="password" name="password" placeholder="Entrer votre mot de passe" autocomplete="new-password" title="8 caractères minimum, 1 majuscule, 1 chiffre" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required><br>
                <label for="confirme">Confirmer votre mot de passe :</label>
                <input type="password" name="confirme" placeholder="Confirmer votre mot de passe" autocomplete="new-password" required title="Veuillez saisir le même mot de passe"><br>
        </fieldset>
        <fieldset>
            <legend>Préférences</legend>
                <label for="pays">Selectionez votre pays :</label>
                <select name="pays" required>
                    <option value="maroc">Maroc</option>
                    <option value="USA">USA</option>
                    <option value="iran">Iran</option>
                    <option value="italie">Italie</option>
                </select>
                
                <label>Pays :</label>
                <input list="pays">
                <datalist id="pays">
                    <option value="Maroc">
                    <option value="France">
                    <option value="uk">
                </datalist>
                <br>
                <label for="genre">Genre :</label>
                <input type="radio" id="homme" name="genre" value="homme" required>
                <label for="homme">Homme</label>
                <input type="radio" id="femme" name="genre" value="femme">
                <label for="femme">Femme</label>
                <br> 
                <label for="interet"> Centre d'interet :</label>
                <input type="checkbox" name="interet" value="sport">
                <label for="sport">Sport</label>
                <input type="checkbox" name="interet" value="video games">
                <label for="video games">Video Games</label>
        </fieldset>
        <fieldset>
            <legend>Biographie et photo</legend>
                <label for="bigraphie">Biographie :</label> <br>
                <textarea name="bigraphie" maxlength="500"></textarea><br>
                <label for="image">uploader une image :</label>
                <input type="file" name="image"> <br>
        </fieldset>
        <fieldset>
            <legend>Acceptation</legend>
                <label for="CGU">Acceptation CGU</label>
                <input type="checkbox" name="CGU" value="accepte" required>
                
        </fieldset>
        <br>
        <input type="submit" value="Envoyer">
    </form>
</body>
</html>
